name: ChatWork IT News - 定時配信

on:
  # UTC時刻（JST = UTC + 9時間）
  # 現在のスケジュール（すべて 9:00 JST）
  schedule:
    - cron: '0 0 * * 1'  # 月曜 9:00 JST
    - cron: '0 0 * * 2'  # 火曜 9:00 JST
    - cron: '0 0 * * 3'  # 水曜 9:00 JST
    - cron: '0 0 * * 4'  # 木曜 9:00 JST
    - cron: '0 0 * * 5'  # 金曜 9:00 JST
  # 手動実行も可能
  workflow_dispatch:

jobs:
  deliver:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存パッケージをインストール
        run: npm ci

      - name: ニュースを配信
        env:
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: node src/deliver-now.js
